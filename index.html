<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<script>
  // A deliberate swipe fixed a mis-sized shell on standalone-launch, but
  // touch/pointer events alone (with no actual scroll motion) didn't — so
  // it's specifically a real scroll iOS is waiting for, not touch or time.
  // Forcing a tiny, invisible scroll-and-back ourselves reproduces that
  // trigger without requiring the user to do it: a well-known workaround
  // for this general family of "mobile viewport doesn't settle without a
  // scroll" bugs.
  (function () {
    function setAppHeight() {
      var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
      document.documentElement.style.setProperty("--app-height", h + "px");
    }
    function nudgeScroll() {
      window.scrollTo(0, 1);
      requestAnimationFrame(function () {
        window.scrollTo(0, 0);
        setAppHeight();
      });
    }
    setAppHeight();
    window.addEventListener("resize", setAppHeight);
    window.addEventListener("orientationchange", setAppHeight);
    document.addEventListener("touchstart", setAppHeight, { passive: true });
    document.addEventListener("touchmove", setAppHeight, { passive: true });
    document.addEventListener("pointerdown", setAppHeight);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setAppHeight);
    }
    nudgeScroll();
    window.addEventListener("load", nudgeScroll);
    [50, 150, 300, 600].forEach(function (delay) {
      setTimeout(nudgeScroll, delay);
    });
  })();
</script>
<meta name="theme-color" content="#14151a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DrumTune Pro" />
<title>DrumTune Pro</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

      </button>
      <h1 id="app-title">DrumTune Pro</h1>
      <button id="about-btn" class="icon-btn" aria-label="About">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.1" fill="currentColor"/></svg>
      </button>
    </header>

    <main id="view-root"></main>

    <nav id="bottom-nav">
      <button class="nav-btn" data-route="home" aria-label="Home">
        <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-route="presets" aria-label="Presets">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="13" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Presets</span>
      </button>
      <button class="nav-btn" data-route="kits" aria-label="Saved Kits">
        <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 7V5.5A2.5 2.5 0 0 1 10.5 3h3A2.5 2.5 0 0 1 16 5.5V7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Kits</span>
      </button>
      <button class="nav-btn" data-route="advanced" aria-label="Analysis">
        <svg viewBox="0 0 24 24"><path d="M4 19V9M10 19V4M16 19v-7M22 19v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Analysis</span>
      </button>
    </nav>
  </div>

  <audio id="audio-unlock" src="assets/silence.wav" playsinline preload="auto" style="display:none"></audio>
  <script type="module" src="js/main.js"></script>
</body>
</html>
